name: "Bug report"
description: "Report a reproducible bug in the Discord bot. Provide steps, expected vs actual behavior, and any relevant logs or attachments."
title: "Bug: ${{ inputs.title }}"
labels:
  - "bug"
  - "needs-triage"

body:
  - type: input
    id: title
    attributes:
      label: "Title"
      description: "A brief title for this command request."
      placeholder: "e.g., Add ban command"

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Summary of what is broken with the command."
      placeholder: "Bot crashes when I try to ban the developer..."
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to reproduce"
      description: "Step-by-step instructions to reproduce the bug. Include exact commands or interactions."
      placeholder: "1. Do this\n2. Run that\n3. Observe the error"
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected behavior"
      description: "What you expected to happen."
      placeholder: "The bot should reply with usage instructions."
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual behavior"
      description: "What actually happened (error messages, stack traces, etc.)."
      placeholder: "Error: Cannot read property 'x' of undefined\n at ... "
      required: true

  - type: attachments
    id: attachments
    attributes:
      label: "Screenshots / files"
      description: "Attach screenshots, recordings, or files that help explain the issue."

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "How severe is the bug?"
      options:
        - label: "Low"
          value: "low"
        - label: "Medium"
          value: "medium"
        - label: "High"
          value: "high"

  - type: markdown
    attributes:
      value: |
        Thanks for the report, a maintainer will triage and follow up. If this is urgent, please ping the dev channel and include a link to the created issue.
