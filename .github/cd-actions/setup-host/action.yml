name: "Setup Host"
description: Sets up the server that hosts client/server

inputs:
  SERVER_USERNAME:
    description: The username to use for authentication.
    required: true
  SERVER_HOST:
    description: The hostname or IP address of the server.
    required: true
  SERVER_SSH_KEY:
    description: The SSH key to use for authentication.
    required: true
  SERVER_OS:
    description: The operating system of the server.
    required: true

runs:
  using: "composite"
  steps:
    - name: Install required dependencies for debian
      uses: appleboy/ssh-action@v1
      if: ${{ inputs.SERVER_OS == 'debian' }}
      with:
        host: ${{ inputs.SERVER_HOST }}
        username: ${{ inputs.SERVER_USERNAME }}
        key: ${{ inputs.SERVER_SSH_KEY }}
        port: 22
        script: |
          #!/usr/bin/env bash
          set -e

          apt install sudo

          echo "Updating package list"
          sudo apt update

          echo "Install docker and docker-compose"
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          sudo apt install -y docker.io docker-compose-plugin docker-buildx-plugin
          sudo usermod -aG docker $USER
          newgrp docker

    - name: Install required dependencies for ubuntu
      uses: appleboy/ssh-action@v1
      if: ${{ inputs.SERVER_OS == 'ubuntu' }}
      with:
        host: ${{ inputs.SERVER_HOST }}
        username: ${{ inputs.SERVER_USERNAME }}
        key: ${{ inputs.SERVER_SSH_KEY }}
        port: 22
        script: |
          #!/usr/bin/env bash
          set -e

          echo "Updating package list"
          sudo apt update

          echo "Install docker and docker-compose"
          sudo apt install -y docker.io docker-compose-v2
          sudo usermod -aG docker $USER
          newgrp docker

          BUILDX_VERSION=$(curl -s https://api.github.com/repos/docker/buildx/releases/latest | grep tag_name | cut -d '"' -f 4)
          mkdir -p .docker
          mkdir -p .docker/cli-plugins
          curl -L "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" -o ~/.docker/cli-plugins/docker-buildx
          chmod +x ~/.docker/cli-plugins/docker-buildx
